<div [formGroup]="form">
  <div class="key-value-row">
    <p-checkbox [binary]="true" formControlName="selected"></p-checkbox>
    <div style="
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-right: 24px
    ">
      <label *ngIf="keyLabel" style="margin: 0; margin-right: 8px;">{{
        keyLabel
        }}</label>

    <input type="text" style="width: 100%" class="form-control" name="key" formControlName="key" />
    <div *ngIf="key.invalid && (key.dirty || key.touched)" class="text-danger">
      <small class="form-text">{{ key.errors!["maxlength"] }}</small>
    </div>
    <p-select [options]="valueTypeList" formControlName="valueType" [style]="{'width':'100%'}"></p-select>
  </div>
  <div
   style="
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    ">

      <label *ngIf="valueLabel" style="margin: 0; margin-right: 8px">{{
        valueLabel
        }}</label>

      <div class="w-100 d-flex align-items-center" style="position: relative;">
        <!-- <input type="text" style="width: 100%" class="form-control" name="value" formControlName="value"
          [hidden]="valueType.value=='file'" /> -->
        @if(valueType.value!=='file'){
          @if (!(isMima && useMask)) {
          <input type="text" class="form-control" formControlName="value">
          } @else {
          <div style="width: 100%;">
            <app-mima-input [control]="form.get('value')"></app-mima-input>
          </div>
          }
        }
        <!-- || this._fileName != '' -->

        <input type="file" [id]="'fileField'+ no" (change)="onFileChange($event)" [hidden]="valueType.value=='text'"
          style="display: none;" multiple/>
        <span class="p-input-icon-right me-2" style="width: 100%;" [hidden]="_fileName==''">
          <i class="pi pi-trash tpi-i-search" (click)="removeFile();"></i>
          <input type="text" class="form-control tpi-i-input" readonly [value]="_fileName">
        </span>
        <button type="button" class="btn tpi-btn tpi-primary pull-right"
          [hidden]="valueType.value=='text'"
          (click)="openFileBrowser();"
          pTooltip="{{'chs_file'|translate}}">
          <!-- {{'chs_file'|translate}} -->
        <i class="fas fa-file-upload"></i></button>
      </div>
      <div *ngIf="value.invalid && (value.dirty || value.touched)" class="text-danger">
        <small class="form-text">{{ value.errors!["ipaddress"] }}</small>
      </div>
    </div>
    <div style="display: flex; align-items: center; justify-content: center">
      <button type="button" class="btn btn-icon tpi-primary mx-1" (click)="delete($event)">
        <i class="fa fa-minus"></i>
      </button>
    </div>
  </div>
</div>
<p-toast [style]="{marginTop: '60px'}" position="top-left"></p-toast>
