<div class="container py-1">
  <form [formGroup]="form">
    <div class="form-group row">
      <div class="col-6 ">
        <label for="keyword">{{'keyword_search'|translate}}</label>
        <input type="text" class="form-control" id="keyword" formControlName="keyword"
          placeholder="{{'client_id'|translate}}、{{'client_name'|translate}}、{{'client_alias'|translate}}">
      </div>
      <div class="col-6">
        <label for="status">{{'status'|translate}}</label>
        <div class="p-form-check-line form-group">
          <ng-container *ngFor="let stat of queryStatusOption">
            <div class="p-form-check">
              <p-radioButton formControlName="encodeStatus" value={{stat.value}}
                inputId="encodeStatus{{stat.value}}"></p-radioButton>
              <label for="encodeStatus{{stat.value}}" class="ms-2 mb-0">{{stat.label}}</label>
            </div>
          </ng-container>
        </div>

      </div>
    </div>

    <div class="col-12 text-center form-group">
      <button type="button" class="btn tpi-btn tpi-primary"
        (click)="queryClientList()">{{'button.search'|translate}}</button>
    </div>

  </form>
  <p-table *ngIf="cols" [columns]="cols" [(selection)]="selectedClientInfoData" [value]="clientInfoData"
    selectionMode="multiple" responsiveLayout="scroll" [style]="{'word-break':'break-word'}"
    styleClass="p-datatable-striped">
    <ng-template pTemplate="header" let-columns>
      <tr>
        <th rowspan="2" style="width: 2.25em" scope="col">
          <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
        </th>
        <th *ngFor="let col of columns" scope="col">
          {{col.header}}
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-rowData let-columns="columns">
      <tr>
        <td>
          <p-tableCheckbox [value]="rowData"></p-tableCheckbox>
        </td>
        <td *ngFor="let col of columns" scope="row">
          {{rowData[col.field]}}
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="footer" let-columns>
      <tr *ngIf="clientInfoData.length>0">
        <td [attr.colspan]="columns.length+1" style="color: #b7b7b7;">
          <span style="vertical-align: middle;">{{'row_count' | translate}}: {{clientInfoData.length}}</span>
          <button type="button" class="btn tpi-header-return" (click)="moreData()">{{ 'button.more'| translate}}
            <i class="fas fa-angle-double-right" style="margin-left: 5px;"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
  <div class="text-center pt-2">
    <button type="button" class="btn tpi-btn tpi-primary me-3" (click)="chooseClient()"
      [disabled]="selectedClientInfoData.length == 0">
      {{ "button.confirm" | translate }}
    </button>
    <button type="button" class="btn tpi-btn tpi-cancel" (click)="cancelClient()">
      {{ "button.cancel" | translate }}
    </button>
  </div>
</div>
